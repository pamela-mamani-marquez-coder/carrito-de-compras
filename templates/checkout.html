{% extends "base.html" %}
{% block title %}Finalizar Compra{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card">
                <div class="card-header bg-success text-white">
                    <h4 class="mb-0"><i class="bi bi-lock me-2"></i>Finalizar Compra</h4>
                </div>
                <div class="card-body">
                    <div class="alert alert-info">
                        <h5>Total a pagar: <span class="text-primary">${{ "%.2f"|format(total) }}</span></h5>
                    </div>
                    
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">Nombre completo *</label>
                            <input type="text" name="nombre" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Correo electrónico *</label>
                            <input type="email" name="email" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Dirección de envío *</label>
                            <textarea name="direccion" class="form-control" rows="3" required></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Teléfono</label>
                            <input type="tel" name="telefono" class="form-control">
                        </div>
                        
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-success btn-lg">
                                <i class="bi bi-check-circle me-2"></i>Confirmar Compra
                            </button>
                            <a href="/carrito" class="btn btn-outline-secondary">
                                <i class="bi bi-arrow-left me-2"></i>Volver al carrito
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
